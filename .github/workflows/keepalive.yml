name: Keep Alive

on:
  schedule:
    - cron: "17 9 1 * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: reponomics-keepalive-${{ github.ref }}
  cancel-in-progress: false

jobs:
  keepalive:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Resolve Reponomics configuration
        run: python .github/scripts/resolve-reponomics-config.py --require-setup

      - name: Update keepalive marker
        id: marker
        if: env.REPONOMICS_SETUP_COMPLETE == 'true'
        run: |
          set -euo pipefail

          timestamp="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          mkdir -p .reponomics
          cat > .reponomics/keepalive.md <<MD
          # Reponomics Scheduled Workflow Keepalive

          Last keepalive: $timestamp

          GitHub documents that scheduled workflows in public repositories may be disabled automatically after 60 days without repository activity. Reponomics updates this file from a monthly workflow to create repository activity for scheduled collection, publication, and incident-response workflows.

          This workflow runs across repository visibility modes because inactive scheduled workflows are an operational risk for any dashboard repository. It is a best-effort safeguard because GitHub does not precisely define repository activity for this policy. If scheduled workflows stop unexpectedly, download the latest \`dashboard-data\` Actions artifact before it expires, then re-enable the workflows from the Actions tab.
          MD

          echo "timestamp=$timestamp" >> "$GITHUB_OUTPUT"

      - name: Commit keepalive marker
        id: commit
        if: env.REPONOMICS_SETUP_COMPLETE == 'true'
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .reponomics/keepalive.md

          if git diff --cached --quiet; then
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "chore: keep Reponomics scheduled workflows active [skip ci]"
          git pull --rebase origin "${GITHUB_REF_NAME:-main}"
          git push
          echo "committed=true" >> "$GITHUB_OUTPUT"

      - name: Create data safety reminder issue
        id: reminder
        if: env.REPONOMICS_SETUP_COMPLETE == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          KEEPALIVE_TIMESTAMP: ${{ steps.marker.outputs.timestamp }}
        run: |
          set -euo pipefail

          python - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request

          repo = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GITHUB_TOKEN"]
          timestamp = os.environ["KEEPALIVE_TIMESTAMP"]
          api_base = f"https://api.github.com/repos/{repo}"
          title = "Reponomics scheduled workflow data safety reminder"
          body = f"""This repository uses scheduled GitHub Actions workflows to collect and preserve Reponomics dashboard data.

          GitHub documents that scheduled workflows in public repositories may be disabled automatically after 60 days without repository activity. This repository includes a monthly keepalive workflow that updates `.reponomics/keepalive.md` across repository visibility modes, but GitHub does not precisely define the activity criteria for that policy.

          If scheduled workflows stop unexpectedly, download the latest `dashboard-data` Actions artifact before it expires. Then re-enable the workflows from the Actions tab.

          Last keepalive: `{timestamp}`

          It is safe to close this issue after you understand the operational risk."""
          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {token}",
              "X-GitHub-Api-Version": "2022-11-28",
              "User-Agent": "reponomics-keepalive",
          }
          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")

          def write_summary(message: str) -> None:
              if not summary_path:
                  return
              with open(summary_path, "a", encoding="utf-8") as handle:
                  handle.write(message)

          def request_json(method: str, url: str, payload: dict | None = None) -> dict | list:
              data = None
              request_headers = dict(headers)
              if payload is not None:
                  data = json.dumps(payload).encode("utf-8")
                  request_headers["Content-Type"] = "application/json"
              request = urllib.request.Request(url, data=data, headers=request_headers, method=method)
              with urllib.request.urlopen(request, timeout=30) as response:
                  response_data = response.read().decode("utf-8")
              return json.loads(response_data) if response_data else {}

          try:
              issues = request_json("GET", f"{api_base}/issues?state=all&per_page=100")
              existing = next(
                  (
                      issue
                      for issue in issues
                      if issue.get("title") == title and "pull_request" not in issue
                  ),
                  None,
              )
              if existing:
                  write_summary(
                      "Reminder issue already exists: "
                      f"[#{existing['number']}]({existing['html_url']}) "
                      f"({existing['state']}).\n"
                  )
              else:
                  created = request_json(
                      "POST",
                      f"{api_base}/issues",
                      {"title": title, "body": body},
                  )
                  write_summary(
                      "Created reminder issue: "
                      f"[#{created['number']}]({created['html_url']}).\n"
                  )
          except urllib.error.HTTPError as exc:
              reason = exc.read().decode("utf-8", errors="replace")
              print(f"Could not create or inspect reminder issue: {exc.code} {reason}")
              write_summary(
                  "Could not create a reminder issue. Issues may be disabled for this repository; "
                  "the keepalive marker commit still completed.\n"
              )
          PY

      - name: Write keepalive summary
        if: env.REPONOMICS_SETUP_COMPLETE == 'true'
        run: |
          set -euo pipefail

          {
            echo "## Reponomics scheduled workflow keepalive"
            echo
            echo "Updated \`.reponomics/keepalive.md\` at \`${{ steps.marker.outputs.timestamp }}\`."
            echo
            echo "GitHub may automatically disable scheduled workflows in public repositories after 60 days without repository activity."
            echo "This keepalive commit runs across repository visibility modes as a best-effort safeguard."
            echo "If scheduled workflows stop unexpectedly,"
            echo "download the latest \`dashboard-data\` Actions artifact before it expires, then re-enable"
            echo "the workflows from the Actions tab."
          } >> "$GITHUB_STEP_SUMMARY"
